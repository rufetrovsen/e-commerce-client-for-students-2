<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <include
      id="header"
      src="../../components/header/header-components.html"
    ></include>

    <div class="content h-screen w-full flex items-center justify-center p-4">
      <div class="w-full h-full border flex flex-col">
        <div class="w-full h-[70%] p-4  overflow-auto">
          <h2 class="text-xl font-bold mb-4">Cart</h2>

          <table class="w-full text-left border-collapse">
            <tr class="bg-gray-300">
              <th class="px-3 py-2 border">Product</th>
              <th class="px-3 py-2 border">Price</th>
              <th class="px-3 py-2 border">Quantity</th>
              <th class="px-3 py-2 border">Subtotal</th>
              <th class="px-3 py-2 border">Actions</th>
            </tr>

            <tr>
              <td class="px-3 py-2 border">
                <img
                  class="w-[100px] h-[100px] object-cover"
                  src="https://www.sheepskinshop.ca/cdn/shop/files/Classic_Short_Shearling_Boot_Pair_45_1.jpg?v=1726087309"
                  alt=""
                />
              </td>
              <td class="px-3 py-2 border">$19.99</td>
              <td class="px-3 py-2 border">
                <select class="bg-white px-3 py-2 rounded-lg border">
                  <option>1</option>
                </select>
              </td>
              <td class="px-3 py-2 border">$19.99</td>
              <td class="px-3 py-2 border">
                <button
                  class="bg-red-500 hover:bg-red-700 text-white py-2 px-4 rounded-lg"
                >
                  Remove
                </button>
              </td>
            </tr>

            <tr>
              <td class="px-3 py-2 border">
                <img
                  class="w-[100px] h-[100px] object-cover"
                  src="https://www.sheepskinshop.ca/cdn/shop/files/Classic_Short_Shearling_Boot_Pair_45_1.jpg?v=1726087309"
                  alt=""
                />
              </td>
              <td class="px-3 py-2 border">$19.99</td>
              <td class="px-3 py-2 border">
                <select class="bg-white px-3 py-2 rounded-lg border">
                  <option>1</option>
                </select>
              </td>
              <td class="px-3 py-2 border">$19.99</td>
              <td class="px-3 py-2 border">
                <button
                  class="bg-red-500 hover:bg-red-700 text-white py-2 px-4 rounded-lg"
                >
                  Remove
                </button>
              </td>
            </tr>
          </table>
        </div>

        <div class="w-full h-[30%] p-4  flex justify-end">
          <div class="w-[300px] border-2  p-4 space-y-3">
            <h2 class="text-xl font-medium">Cart Total</h2>

            <p class="flex justify-between">
              <span class="font-medium">Subtotal:</span>
              <span class="text-red-600 font-bold">$186.99</span>
            </p>

            <hr />

            <p class="flex justify-between">
              <span class="font-medium">Shipping:</span>
              <span class="text-red-600 font-bold">$10.00</span>
            </p>

            <hr />

            <p class="flex justify-between text-lg">
              <span class="font-bold">Total:</span>
              <span class="text-red-600 font-bold">$196.99</span>
            </p>

            <button
              class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800"
            >
              Proceed to Checkout
            </button>
          </div>
        </div>
      </div>
    </div>

    <include
      id="footer"
      src="../../components/footer/footer-component.html"
    ></include>

    <script type="module" src="../../utils/include.js"></script>
  </body>
</html>
