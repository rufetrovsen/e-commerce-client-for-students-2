<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
     <include  id="header" src="../../components/header/header-components.html"></include>

     <div class="content h-screen w-full flex items-center justify-center">
      <form class="w-[400px]   p-3 space-y-3 p-3">
       <h2 class="font-medium text-4xl text-center">Log in</h2>
       
       <p>Username</p>
       <input type="text"  class="w-full bg-white border border-gray-300 rounded-md px-1 py-2">
       <p>Password</p>
       <input type="password"  class="w-full bg-white border border-gray-300 rounded-md px-1 py-2">
       <button type="submit" class="w-full bg-red-500 text-white font-medium rounded-md px-1 py-2 hover:bg-red-600">Log in</button>
       <p class="font-medium text-center">Don't have an account? <a href="#" class="text-red-500">Create</a></p>

      </form>
     </div>
     <include id="footer" src="../../components/footer/footer-component.html"></include>
